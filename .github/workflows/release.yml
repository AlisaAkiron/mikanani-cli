name: Release

# Build release binaries when a version tag is pushed, and attach the
# archives to the GitHub Release for that tag.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Every target builds on a native runner: aws-lc-sys / ring (the
          # rustls crypto backends) compile C + assembly, which is painful to
          # cross-compile but trivial natively.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-15
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # aws-lc-sys and ring need NASM to assemble their x86_64 code on MSVC.
      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          bin="target/$TARGET/release/mikan"
          strip "$bin" || true
          staging="mikan-${GITHUB_REF_NAME}-${TARGET}"
          mkdir "$staging"
          cp "$bin" README.md README.en.md LICENSE "$staging/"
          tar czf "$staging.tar.gz" "$staging"
          echo "ASSET=$staging.tar.gz" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
        run: |
          $bin = "target/$env:TARGET/release/mikan.exe"
          $staging = "mikan-$env:GITHUB_REF_NAME-$env:TARGET"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item $bin, README.md, README.en.md, LICENSE $staging
          Compress-Archive -Path $staging -DestinationPath "$staging.zip"
          "ASSET=$staging.zip" >> $env:GITHUB_ENV

      - name: Upload archive to the release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: true
